<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport pensé pour l'ordi ET la tablette : pas de zoom, plein écran tactile -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Projet Nyxt — Battle Royale</title>
    <!-- Favicon lune (thème Nyxt), en data-URI pour rester autonome -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230b0b1a'/%3E%3Cpath d='M20 8a8 8 0 1 0 0 16 6 6 0 0 1 0-16z' fill='%236a4dff'/%3E%3C/svg%3E"
    />
    <!-- PWA / installable : « Sur l'écran d'accueil » (iPad/iPhone) + « Installer » (Android) -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#0b0b1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Projet Nyxt" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0b1a;
        overflow: hidden;
        /* évite le comportement de scroll/rebond tactile sur tablette */
        overscroll-behavior: none;
        touch-action: none;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      }
      #game {
        width: 100%;
        height: 100%;
      }
      /* Nyxt se joue en PAYSAGE : sur un TÉLÉPHONE tenu en portrait, on invite à
         tourner l'écran (couvre tout, le jeu reste actif derrière).
         `max-width: 540px` cible les téléphones : l'iPad (≥ 744 px en portrait)
         et l'ordi ne sont jamais concernés. */
      #rotate {
        display: none;
      }
      @media (orientation: portrait) and (pointer: coarse) and (max-width: 540px) {
        #rotate {
          display: flex;
          position: fixed;
          inset: 0;
          z-index: 9999;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          text-align: center;
          background: #0b0b1a;
          color: #f2f2ff;
          padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
      }
      #rotate .phone {
        font-size: 68px;
        line-height: 1;
        animation: nyxt-rot 2s ease-in-out infinite;
      }
      #rotate p {
        font-size: 22px;
        font-weight: 800;
        margin: 18px 0 6px;
      }
      #rotate span {
        font-size: 15px;
        color: #9b8cff;
      }
      @keyframes nyxt-rot {
        0%, 40% { transform: rotate(0deg); }
        60%, 100% { transform: rotate(-90deg); }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-DzhOjanK.js"></script>
  </head>
  <body>
    <div id="game"></div>
    <div id="rotate" aria-hidden="true">
      <div class="phone">📱</div>
      <p>Tourne ton téléphone</p>
      <span>Nyxt se joue en mode paysage</span>
    </div>
  </body>
</html>
